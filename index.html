<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desayunos · Haz tu pedido</title>
  <style>
    /* ============================================================
       ESTILOS — diseño mobile-first (la mayoría pedirá desde el celular)
       ============================================================ */
    :root {
      --color-fondo: #fffaf3;
      --color-tarjeta: #ffffff;
      --color-primario: #e07b39;   /* naranja desayuno */
      --color-primario-osc: #c4652a;
      --color-texto: #2d2a26;
      --color-texto-suave: #8a8378;
      --color-exito: #2e7d32;
      --color-error: #c62828;
      --radio: 14px;
      --sombra: 0 2px 10px rgba(45, 42, 38, .08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--color-fondo);
      color: var(--color-texto);
      padding-bottom: 120px; /* espacio para la barra fija del carrito */
    }
    header {
      background: linear-gradient(135deg, var(--color-primario), #f0a35e);
      color: #fff;
      padding: 28px 20px 22px;
      text-align: center;
    }
    header h1 { font-size: 1.7rem; letter-spacing: .5px; }
    header p  { opacity: .92; margin-top: 6px; font-size: .95rem; }

    main { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* Datos del cliente */
    .panel {
      background: var(--color-tarjeta);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 16px;
      margin: 14px 0;
    }
    .panel label { display: block; font-weight: 600; font-size: .9rem; margin: 10px 0 4px; }
    .panel input[type="text"], .panel input[type="date"], .panel textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5ded4;
      border-radius: 10px;
      font-size: 1rem;
      background: #fffdf9;
    }
    .panel input:focus, .panel textarea:focus { outline: 2px solid var(--color-primario); border-color: transparent; }
    .check-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: .95rem; }
    .check-row input { width: 20px; height: 20px; accent-color: var(--color-primario); }

    /* Chips de personas (pedidos grupales) */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      padding: 9px 14px;
      border: none; border-radius: 20px;
      background: #f6e8d8; color: var(--color-primario-osc);
      font-weight: 600; font-size: .9rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .chip.activa { background: var(--color-primario); color: #fff; }
    .chip .contador {
      background: rgba(0,0,0,.12); border-radius: 10px;
      padding: 1px 8px; font-size: .78rem;
    }
    .chip .quitar { font-weight: 800; opacity: .7; padding: 0 2px; }
    .chip-agregar {
      background: #fff;
      border: 1.5px dashed var(--color-primario);
      color: var(--color-primario-osc);
    }
    .form-persona { display: flex; gap: 8px; margin-top: 10px; }
    .form-persona input { flex: 1; }
    .form-persona button {
      background: var(--color-primario); color: #fff;
      border: none; border-radius: 10px; padding: 0 18px;
      font-weight: 700; cursor: pointer;
    }
    .aviso-persona { font-size: .8rem; color: var(--color-texto-suave); margin-top: 8px; }

    /* Menú */
    h2.categoria {
      margin: 26px 4px 10px;
      font-size: 1.15rem;
      color: var(--color-primario-osc);
      border-bottom: 2px dashed #eadfce;
      padding-bottom: 6px;
    }
    .producto {
      background: var(--color-tarjeta);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .producto .info { flex: 1; }
    .producto .nombre { font-weight: 700; font-size: 1rem; }
    .producto .descripcion { font-size: .82rem; color: var(--color-texto-suave); margin-top: 2px; }
    .producto .precio { font-size: .92rem; color: var(--color-primario-osc); font-weight: 700; margin-top: 4px; }

    /* Controles de cantidad  (− 2 +) */
    .cantidad { display: flex; align-items: center; gap: 10px; }
    .cantidad button {
      width: 36px; height: 36px;
      border: none; border-radius: 50%;
      background: #f6e8d8; color: var(--color-primario-osc);
      font-size: 1.3rem; font-weight: 700;
      cursor: pointer;
      transition: transform .1s;
    }
    .cantidad button:active { transform: scale(.9); }
    .cantidad button.mas { background: var(--color-primario); color: #fff; }
    .cantidad .num { min-width: 22px; text-align: center; font-weight: 700; font-size: 1.05rem; }

    /* Barra fija inferior con el total */
    .barra-carrito {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--color-tarjeta);
      box-shadow: 0 -4px 16px rgba(45, 42, 38, .12);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    }
    .barra-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
    .barra-total { flex: 1; }
    .barra-total .etiqueta { font-size: .78rem; color: var(--color-texto-suave); }
    .barra-total .valor { font-size: 1.35rem; font-weight: 800; }
    .btn-enviar {
      background: var(--color-primario); color: #fff;
      border: none; border-radius: 12px;
      padding: 14px 26px;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer;
    }
    .btn-enviar:disabled { background: #d8cfc2; cursor: not-allowed; }

    /* Mensajes de estado (éxito / error) */
    .estado {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      max-width: 90%; width: 420px;
      padding: 14px 18px; border-radius: 12px;
      color: #fff; font-weight: 600; font-size: .95rem;
      box-shadow: var(--sombra);
      z-index: 50;
      display: none;
    }
    .estado.exito { background: var(--color-exito); display: block; }
    .estado.error { background: var(--color-error); display: block; }
  </style>
</head>
<body>

  <!-- ══════════════ ESTRUCTURA DE LA PÁGINA ══════════════ -->
  <div class="estado" id="estado" role="alert"></div>

  <header>
    <h1 id="titulo-negocio"></h1>
    <p id="lema-negocio"></p>
  </header>

  <main>
    <!-- Datos del cliente -->
    <section class="panel">
      <label for="cliente">¿A nombre de quién es el pedido? *</label>
      <input type="text" id="cliente" placeholder="Ej: Doña Marta" autocomplete="name">

      <!-- La dirección solo es obligatoria para domicilios (casilla de
           WhatsApp marcada). Si se desmarca (venta en el local), este
           campo se oculta y se registra "En el local". -->
      <div id="campo-direccion">
        <label for="direccion">Dirección de entrega *</label>
        <input type="text" id="direccion" placeholder="Ej: Calle 12 #34-56, casa verde" autocomplete="street-address">
      </div>

      <label for="fecha">Fecha del pedido</label>
      <input type="date" id="fecha">

      <label for="nota">Nota (opcional)</label>
      <textarea id="nota" rows="2" placeholder="Ej: la arepa sin sal, entregar en la portería"></textarea>

      <div class="check-row">
        <input type="checkbox" id="enviar-whatsapp" checked>
        <label for="enviar-whatsapp" style="margin:0; font-weight:500;">Pedido a domicilio (se envía por WhatsApp al negocio)</label>
      </div>
    </section>

    <!-- Pedido grupal: una persona puede pedir para varias. Cada "chip"
         es una persona con su propio carrito (sub-pedido); los productos
         que marques en el menú se agregan a la persona seleccionada. -->
    <section class="panel">
      <label style="margin-top:0;">¿Para quiénes es el pedido?</label>
      <div class="chips" id="chips-personas"></div>
      <div class="form-persona" id="form-persona" style="display:none;">
        <input type="text" id="nueva-persona" placeholder="Nombre, ej: Kevin" maxlength="40">
        <button id="btn-confirmar-persona">Listo</button>
      </div>
      <div class="aviso-persona">Toca una persona para armar su parte del pedido. Los productos del menú se agregan a quien esté seleccionado.</div>
    </section>

    <!-- El menú se genera aquí desde CONFIG.menu -->
    <section id="menu"></section>
  </main>

  <!-- Barra fija con total y botón de envío -->
  <div class="barra-carrito">
    <div class="barra-inner">
      <div class="barra-total">
        <div class="etiqueta" id="resumen-items">0 productos</div>
        <div class="valor" id="total">$ 0</div>
      </div>
      <button class="btn-enviar" id="btn-enviar" disabled>Hacer pedido</button>

  <!-- ══════════════════════════════════════════════════════════════
       LÓGICA DE LA APLICACIÓN
       No necesitas tocar nada de aquí hacia abajo para cambiar
       la carta, el número o el negocio: todo sale de CONFIG.
       ══════════════════════════════════════════════════════════════ -->
  <script>
    /* ---------- Estado de la aplicación ----------
       Un pedido puede ser para VARIAS personas (pedido grupal).
       Cada persona tiene su propio carrito (un Map: id producto -> cantidad).
       La primera persona es siempre el responsable del pedido: su nombre
       no se guarda aquí (nombre: null) sino que se lee del campo #cliente,
       así se actualiza solo mientras escribe. */
    function crearPersona(nombre) {
      return { nombre: nombre, carrito: new Map() };
    }
    let personas = [crearPersona(null)];
    let personaActiva = 0; // índice de la persona seleccionada

    function carritoActivo() { return personas[personaActiva].carrito; }

    function nombrePersona(p) {
      if (p.nombre !== null) return p.nombre;
      return document.getElementById("cliente").value.trim() || "Responsable";
    }

    /* Índice para buscar un producto por su id en O(1),
       construido una sola vez a partir de CONFIG.menu. */
    const indiceProductos = new Map();
    CONFIG.menu.forEach(cat =>
      cat.items.forEach(item => indiceProductos.set(item.id, { ...item, categoria: cat.categoria }))
    );

    /* ---------- Utilidades ---------- */

    // Formatea 3500 como "$ 3.500" según la región configurada.
    const formatoMoneda = new Intl.NumberFormat(CONFIG.region, {
      style: "currency",
      currency: CONFIG.moneda,
      maximumFractionDigits: 0
    });
    const precio = (valor) => formatoMoneda.format(valor);

    // Genera un id de pedido legible: PED-20260713-483
    function generarIdPedido() {
      const ahora = new Date();
      const fecha = ahora.toISOString().slice(0, 10).replaceAll("-", "");
      const aleatorio = Math.floor(Math.random() * 900) + 100;
      return `PED-${fecha}-${aleatorio}`;
    }

    // Muestra un aviso flotante de éxito o error durante unos segundos.
    function mostrarEstado(mensaje, tipo) {
      const el = document.getElementById("estado");
      el.textContent = mensaje;
      el.className = `estado ${tipo}`;
      setTimeout(() => { el.className = "estado"; }, 6000);
    }

    /* ---------- Renderizado del menú ---------- */

    function renderizarMenu() {
      const contenedor = document.getElementById("menu");
      // Recorremos las categorías y construimos el HTML de cada producto.
      contenedor.innerHTML = CONFIG.menu.map(cat => `
        <h2 class="categoria">${cat.categoria}</h2>
        ${cat.items.map(item => `
          <div class="producto">
            <div class="info">
              <div class="nombre">${item.nombre}</div>
              ${item.descripcion ? `<div class="descripcion">${item.descripcion}</div>` : ""}
              <div class="precio">${precio(item.precio)}</div>
            </div>
            <div class="cantidad">
              <button aria-label="Quitar ${item.nombre}" onclick="cambiarCantidad('${item.id}', -1)">−</button>
              <span class="num" id="cant-${item.id}">0</span>
              <button class="mas" aria-label="Agregar ${item.nombre}" onclick="cambiarCantidad('${item.id}', 1)">+</button>
            </div>
          </div>
        `).join("")}
      `).join("");
    }

    /* ---------- Lógica del carrito ---------- */

    // Los cambios de cantidad siempre aplican al carrito de la persona activa.
    function cambiarCantidad(id, delta) {
      const carrito = carritoActivo();
      const actual = carrito.get(id) || 0;
      const nueva = Math.max(0, actual + delta); // nunca menor que 0
      if (nueva === 0) carrito.delete(id);
      else carrito.set(id, nueva);

      document.getElementById(`cant-${id}`).textContent = nueva;
      actualizarBarra();
      renderizarPersonas(); // refresca el contador del chip
    }

    function subtotalPersona(p) {
      let total = 0;
      for (const [id, cantidad] of p.carrito) {
        total += indiceProductos.get(id).precio * cantidad;
      }
      return total;
    }

    function contarItems(p) {
      return [...p.carrito.values()].reduce((suma, c) => suma + c, 0);
    }

    // El total del pedido es la suma de los sub-pedidos de todas las personas.
    function calcularTotal() {
      return personas.reduce((suma, p) => suma + subtotalPersona(p), 0);
    }

    function actualizarBarra() {
      const numItems = personas.reduce((suma, p) => suma + contarItems(p), 0);
      document.getElementById("resumen-items").textContent =
        numItems === 1 ? "1 producto" : `${numItems} productos`;
      document.getElementById("total").textContent = precio(calcularTotal());
      document.getElementById("btn-enviar").disabled = numItems === 0;
    }

    /* ---------- Personas (pedido grupal) ---------- */

    function renderizarPersonas() {
      const contenedor = document.getElementById("chips-personas");
      const chips = personas.map((p, i) => {
        const items = contarItems(p);
        return `
          <button class="chip ${i === personaActiva ? "activa" : ""}" onclick="seleccionarPersona(${i})">
            ${nombrePersona(p)}
            ${items > 0 ? `<span class="contador">${items}</span>` : ""}
            ${i > 0 ? `<span class="quitar" onclick="event.stopPropagation(); quitarPersona(${i})" title="Quitar persona">×</span>` : ""}
          </button>`;
      });
      chips.push(`<button class="chip chip-agregar" onclick="mostrarFormPersona()">+ Otra persona</button>`);
      contenedor.innerHTML = chips.join("");
    }

    function seleccionarPersona(i) {
      personaActiva = i;
      renderizarPersonas();
      refrescarCantidades(); // el menú pasa a mostrar el carrito de esta persona
    }

    // Pone en el menú las cantidades del carrito de la persona activa.
    function refrescarCantidades() {
      const carrito = carritoActivo();
      for (const id of indiceProductos.keys()) {
        document.getElementById(`cant-${id}`).textContent = carrito.get(id) || 0;
      }
    }

    function mostrarFormPersona() {
      document.getElementById("form-persona").style.display = "flex";
      document.getElementById("nueva-persona").focus();
    }

    function agregarPersona() {
      const input = document.getElementById("nueva-persona");
      const nombre = input.value.trim();
      if (!nombre) { input.focus(); return; }
      personas.push(crearPersona(nombre));
      personaActiva = personas.length - 1; // queda seleccionada la nueva
      input.value = "";
      document.getElementById("form-persona").style.display = "none";
      renderizarPersonas();
      refrescarCantidades();
    }

    function quitarPersona(i) {
      personas.splice(i, 1); // elimina a la persona y su carrito
      if (personaActiva >= personas.length) personaActiva = personas.length - 1;
      renderizarPersonas();
      refrescarCantidades();
      actualizarBarra();
    }

    /* ---------- Construcción del pedido ---------- */

    // Convierte los carritos de todas las personas en la estructura que
    // espera el backend: una lista PLANA de productos donde cada uno lleva
    // la persona a la que pertenece. La hoja de cálculo es plana (filas),
    // así que "aplanamos" el pedido grupal etiquetando cada fila.
    function construirPedido() {
      const items = [];
      personas.forEach(p => {
        const persona = nombrePersona(p);
        for (const [id, cantidad] of p.carrito) {
          const prod = indiceProductos.get(id);
          items.push({
            nombre: prod.nombre,
            categoria: prod.categoria,
            precio: prod.precio,
            cantidad: cantidad,
            subtotal: prod.precio * cantidad,
            persona: persona
          });
        }
      });

      // Si es domicilio (WhatsApp marcado) la dirección viene del campo;
      // si es venta en el local, se registra como "En el local".
      const esDomicilio = document.getElementById("enviar-whatsapp").checked;
      const direccion = esDomicilio
        ? document.getElementById("direccion").value.trim()
        : "En el local";

      return {
        pedidoId: generarIdPedido(),
        fecha: document.getElementById("fecha").value,      // "2026-07-13"
        cliente: document.getElementById("cliente").value.trim(),
        direccion: direccion,
        nota: document.getElementById("nota").value.trim(),
        items: items,
        total: calcularTotal()
      };
    }

    // Arma el texto del mensaje de WhatsApp con el detalle del pedido.
    // Nota: a propósito NO usa emojis. Los emojis viajan mal por el
    // parámetro ?text= en algunos WhatsApp de escritorio (llegan como �),
    // y no controlamos qué cliente de WhatsApp usa cada persona.
    function construirMensajeWhatsApp(pedido) {
      const partes = [
        `*Nuevo pedido — ${CONFIG.nombreNegocio}*`,
        `Cliente: ${pedido.cliente}`,
        `Dirección: ${pedido.direccion}`,
        `Fecha: ${pedido.fecha}`,
        ``
      ];

      // Personas distintas que aparecen en los items, en orden.
      const nombres = [...new Set(pedido.items.map(i => i.persona))];

      if (nombres.length === 1) {
        // Pedido individual: lista simple, sin repetir el nombre.
        pedido.items.forEach(i => partes.push(`• ${i.cantidad} x ${i.nombre} — ${precio(i.subtotal)}`));
      } else {
        // Pedido grupal: los productos agrupados por persona, con su subtotal.
        nombres.forEach(nombre => {
          const suyos = pedido.items.filter(i => i.persona === nombre);
          const subtotal = suyos.reduce((s, i) => s + i.subtotal, 0);
          partes.push(`*${nombre}* (${precio(subtotal)}):`);
          suyos.forEach(i => partes.push(`• ${i.cantidad} x ${i.nombre} — ${precio(i.subtotal)}`));
          partes.push(``);
        });
        partes.pop(); // quita la línea en blanco final del bucle
      }

      partes.push(``, `*Total: ${precio(pedido.total)}*`);
      if (pedido.nota) partes.push(`Nota: ${pedido.nota}`);
      partes.push(`\nPedido: ${pedido.pedidoId}`);
      return partes.join("\n");
    }

    /* ---------- Envío ---------- */

    // Guarda el pedido en Google Sheets llamando al Apps Script.
    // Usamos Content-Type "text/plain" a propósito: así el navegador hace
    // una "solicitud simple" y evita el preflight de CORS que Apps Script
    // no sabe responder. El detalle está explicado en la documentación.
    async function guardarEnSheets(pedido) {
      const respuesta = await fetch(CONFIG.urlBackend, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(pedido)
      });
      if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);
      const datos = await respuesta.json();
      if (!datos.ok) throw new Error(datos.error || "Error desconocido del backend");
      return datos;
    }

    async function enviarPedido() {
      const boton = document.getElementById("btn-enviar");

      // Validaciones mínimas antes de enviar
      const cliente = document.getElementById("cliente").value.trim();
      if (!cliente) {
        mostrarEstado("Escribe el nombre de quien hace el pedido 🙂", "error");
        document.getElementById("cliente").focus();
        return;
      }
      // La dirección es obligatoria solo para domicilios (WhatsApp marcado):
      // quien pide desde la app no está en el negocio.
      const esDomicilio = document.getElementById("enviar-whatsapp").checked;
      if (esDomicilio && !document.getElementById("direccion").value.trim()) {
        mostrarEstado("Escribe la dirección de entrega para el domicilio 🙂", "error");
        document.getElementById("direccion").focus();
        return;
      }
      if (calcularTotal() === 0) return;

      const pedido = construirPedido();
      boton.disabled = true;
      boton.textContent = "Enviando…";

      // 1) Guardar en Google Sheets (si el backend está configurado)
      let guardado = false;
      if (CONFIG.urlBackend.startsWith("https://")) {
        try {
          await guardarEnSheets(pedido);
          guardado = true;
        } catch (err) {
          console.error("No se pudo guardar en Sheets:", err);
        }
      }

      // 2) Abrir WhatsApp con el mensaje listo (si el usuario lo dejó marcado)
      if (document.getElementById("enviar-whatsapp").checked) {
        const url = `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(construirMensajeWhatsApp(pedido))}`;
        window.open(url, "_blank");
      }

      // 3) Informar el resultado y limpiar el carrito si todo salió bien
      if (guardado) {
        mostrarEstado(`✅ Pedido ${pedido.pedidoId} registrado. ¡Gracias, ${cliente}!`, "exito");
        limpiarCarrito();
      } else if (CONFIG.urlBackend.startsWith("https://")) {
        mostrarEstado("⚠️ El pedido se envió por WhatsApp pero no se pudo guardar en el historial. Intenta de nuevo o avisa al administrador.", "error");
      } else {
        mostrarEstado("Pedido enviado por WhatsApp. (El historial aún no está conectado: falta la URL del backend en CONFIG).", "exito");
        limpiarCarrito();
      }

      boton.textContent = "Hacer pedido";
      boton.disabled = calcularTotal() === 0;
    }

    function limpiarCarrito() {
      personas = [crearPersona(null)]; // vuelve a quedar solo el responsable
      personaActiva = 0;
      document.getElementById("nota").value = "";
      document.getElementById("direccion").value = "";
      renderizarPersonas();
      refrescarCantidades();
      actualizarBarra();
    }

    /* Muestra u oculta el campo de dirección según el tipo de venta:
       casilla marcada = domicilio (dirección obligatoria),
       desmarcada = venta en el local (no aplica dirección). */
    function alternarCampoDireccion() {
      const esDomicilio = document.getElementById("enviar-whatsapp").checked;
      document.getElementById("campo-direccion").style.display = esDomicilio ? "" : "none";
    }

    /* ---------- Arranque ---------- */

    function iniciar() {
      // Textos del encabezado desde la configuración
      document.title = `${CONFIG.nombreNegocio} · Haz tu pedido`;
      document.getElementById("titulo-negocio").textContent = CONFIG.nombreNegocio;
      document.getElementById("lema-negocio").textContent = CONFIG.lema;

      // La fecha del pedido arranca en "hoy" (hora local del dispositivo)
      const hoy = new Date();
      hoy.setMinutes(hoy.getMinutes() - hoy.getTimezoneOffset()); // corrige a hora local
      document.getElementById("fecha").value = hoy.toISOString().slice(0, 10);

      renderizarMenu();
      renderizarPersonas();
      actualizarBarra();
      document.getElementById("btn-enviar").addEventListener("click", enviarPedido);
      document.getElementById("enviar-whatsapp").addEventListener("change", alternarCampoDireccion);
      alternarCampoDireccion();

      // Pedido grupal: agregar persona con el botón o con la tecla Enter,
      // y refrescar el nombre del primer chip mientras se escribe el cliente.
      document.getElementById("btn-confirmar-persona").addEventListener("click", agregarPersona);
      document.getElementById("nueva-persona").addEventListener("keydown", e => {
        if (e.key === "Enter") agregarPersona();
      });
      document.getElementById("cliente").addEventListener("input", renderizarPersonas);
    }

    iniciar();
  </script>
</body>
</html>
